name: CI (GitCode)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    runs-on: euleros-2.10.1
    steps:
      - name: 检出代码
        uses: checkout-action@0.0.1

      - name: 设置 Python 3.14
        uses: setup-python@0.0.1
        with:
          python-version: "3.14"

      - name: 安装 uv
        run: pip install uv

      - name: 安装依赖
        run: cd repo_workspace && uv sync --group test

      - name: Ruff 静态扫描
        run: cd repo_workspace && uv run ruff check .

      - name: 文档内链校验
        run: cd repo_workspace && python .agents/scripts/check_doc_links.py

  test:
    runs-on: euleros-2.10.1
    needs: lint
    steps:
      - name: 检出代码
        uses: checkout-action@0.0.1

      - name: 设置 Python 3.14
        uses: setup-python@0.0.1
        with:
          python-version: "3.14"

      - name: 安装 uv
        run: pip install uv

      - name: 安装依赖
        run: cd repo_workspace && uv sync --group test

      - name: 运行测试
        run: cd repo_workspace && uv run pytest tests/ -v --cov=taolib --cov-report=xml --cov-report=term-missing --cov-fail-under=80

  build:
    runs-on: euleros-2.10.1
    needs: test
    steps:
      - name: 检出代码
        uses: checkout-action@0.0.1

      - name: 设置 Python 3.14
        uses: setup-python@0.0.1
        with:
          python-version: "3.14"

      - name: 安装 uv
        run: pip install uv

      - name: 安装依赖
        run: cd repo_workspace && uv sync --group test

      - name: 构建包
        run: cd repo_workspace && uv build

  docs:
    runs-on: euleros-2.10.1
    needs: lint
    steps:
      - name: 检出代码
        uses: checkout-action@0.0.1

      - name: 设置 Python 3.14
        uses: setup-python@0.0.1
        with:
          python-version: "3.14"

      - name: 安装 uv
        run: pip install uv

      - name: 安装文档依赖
        run: cd repo_workspace && uv sync --group docs

      - name: 严格构建文档 (-W --keep-going)
        env:
          SPHINXOPTS: "-W --keep-going"
        run: cd repo_workspace/docs && uv run invoke build --target html
