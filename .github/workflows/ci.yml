name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install managed tools
        run: mise install

      - name: Install test dependencies
        run: mise run install-test-deps

      - name: Run GitHub App token tests
        run: mise run test-github-app

      - name: Run tests with coverage
        run: mise run test-coverage

      - name: Check coverage threshold
        run: |
          echo "测试覆盖率必须 >= 80%"
          echo "如果上一步失败，请查看覆盖率报告并补充测试"
        if: failure()

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        if: matrix.os == 'ubuntu-latest'

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-mise
          path: htmlcov/
          retention-days: 14
        if: always()

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run pre-commit hooks
        run: |
          mise install
          mise run lint

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install managed tools
        run: mise install

      - name: Install test dependencies
        run: mise run install-test-deps

      - name: Audit Python dependencies
        run: mise run audit

