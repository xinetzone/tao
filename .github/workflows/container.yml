name: Container Images

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "src/**"
      - "deploy/**"
      - "pyproject.toml"
      - ".github/workflows/container.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "deploy/**"
      - "pyproject.toml"
      - ".github/workflows/container.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/taolib

jobs:
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: config-center
            containerfile: deploy/services/Containerfile.config-center
          - service: data-sync
            containerfile: deploy/services/Containerfile.data-sync
          - service: log-platform
            containerfile: deploy/services/Containerfile.log-platform
          - service: qrcode
            containerfile: deploy/services/Containerfile.qrcode

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name != 'pull_request'

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.containerfile }}
          push: false
          load: true
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.containerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        if: github.event_name != 'pull_request'

