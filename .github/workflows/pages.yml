# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      unlink_flexloop:
        description: 'Whether to unlink flexloop repository'
        required: false
        default: 'false'
        type: boolean

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@main
        with:
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整 git 历史（含 tags），供 PDM SCM 版本使用
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: 🔧 环境与依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          python -m pip install --upgrade pip
          pip install .[doc,dev] --upgrade
      - name: 🔧 Build HTML
        run: |
          invoke doc
      - name: 🧹 Clean up unnecessary files
        run: |
          # Remove environment.pickle (large cache file)
          if [ -f "doc/_build/html/environment.pickle" ]; then
            rm "doc/_build/html/environment.pickle"
            echo "Removed environment.pickle"
          fi
          
          # Remove .doctree files (intermediate build files)
          find "doc/_build/html" -name "*.doctree" -type f -delete
          echo "Removed .doctree files"
          
          # Remove any .pyc files
          find "doc/_build/html" -name "*.pyc" -type f -delete
          echo "Removed .pyc files"
          
          # Remove empty directories
          find "doc/_build/html" -type d -empty -delete
          echo "Removed empty directories"
      - name: 📦 Compress static resources
        run: |
          # 安装压缩工具
          npm install -g cssnano terser imagemin-cli
          
          # 运行压缩脚本
          python doc/scripts/compress_static.py
          
          # 替换构建目录为压缩后的目录
          rm -rf doc/_build/html
          mv doc/_build/html_compressed doc/_build/html
          echo "Compressed static resources"
      - name: 📊 Monitor build size
        run: |
          # 运行监控脚本
          python doc/scripts/monitor_build_size.py --set-baseline
          echo "Monitored build size"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'doc/_build/html/'
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        # uses: peaceiris/actions-gh-pages@v3.6.1
