# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package
on:
  release:
    types: [published]

env:
  MISE_EXPERIMENTAL: "1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/chaos
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # 获取完整 git 历史（含 tags），供 PDM SCM 版本使用
      - name: Set up mise
        uses: jdx/mise-action@v4
      - name: Install managed tools
        run: mise install
      - name: Install test dependencies
        run: mise run install-test-deps
      - name: Run tests before publish
        run: mise run test-release
      - name: Verify clean working tree before build
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty before build. PDM SCM version would be polluted with +d<date> local segment, leading to PyPI rejection."
            git status
            exit 1
          fi
          echo "::notice::Working tree is clean; PDM SCM version will derive cleanly from the tag."
      - name: Build package
        run: mise run package-build
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
