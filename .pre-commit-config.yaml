repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=10240']  # 10MB限制
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # 严格构建文档（仅手动阶段触发，不拦截日常 commit/push）
  # 按需运行：pre-commit run docs-strict --hook-stage manual --all-files
  - repo: local
    hooks:
      - id: docs-strict
        name: docs-strict (sphinx -W --keep-going)
        entry: mise run docs-strict
        language: system
        pass_filenames: false
        stages: [manual]
      - id: validate-skills
        name: validate-skills (SKILL.md compliance)
        entry: uv run python .agents/scripts/validation/validate_skill_md.py
        language: system
        pass_filenames: false
        files: '^\.agents/skills/.*/SKILL\.md$'
