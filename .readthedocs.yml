version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.14"
    nodejs: "22"
  commands:
    - uv sync --directory apps/chaos --group dev --group docs
    - uv run --directory apps/chaos sphinx-build -T -b html -d _build/doctrees -D language=zh_CN docs $READTHEDOCS_OUTPUT/html

formats:
  - htmlzip
