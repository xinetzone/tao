name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_EXPERIMENTAL: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  init-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]

    steps:
      - uses: actions/checkout@v5

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run init-check (trust + check-env)
        run: mise run init-check

  init-check-macos:
    if: github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run init-check (trust + check-env)
        run: mise run init-check

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install managed tools
        run: mise install

      - name: Install test dependencies
        run: mise run install-test-deps

      - name: Install CJK fonts for PDF skill tests
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Run pdf-to-markdown skill integration tests
        run: uv run pytest .agents/skills/pdf-to-markdown/tests/ -v

      - name: Run GitHub App token tests
        run: mise run test-github-app

      - name: Run tests with coverage
        run: mise run test-coverage

      - name: Check coverage threshold
        run: |
          echo "测试覆盖率必须 >= 80%"
          echo "如果上一步失败，请查看覆盖率报告并补充测试"
        if: failure()

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        if: matrix.os == 'ubuntu-latest'

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ matrix.os }}-mise
          path: htmlcov/
          retention-days: 14
        if: always()

  test-macos:
    if: github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install managed tools
        run: mise install

      - name: Install test dependencies
        run: mise run install-test-deps

      - name: Run GitHub App token tests
        run: mise run test-github-app

      - name: Run tests with coverage
        run: mise run test-coverage

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-macos-latest-mise
          path: htmlcov/
          retention-days: 14
        if: always()

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run pre-commit hooks
        run: |
          mise install
          uv sync --group dev
          mise run lint

      - name: Check internal documentation links
        run: mise run docs-internal-linkcheck

      - name: Check docs/ structure (dual-track)
        run: mise run docs-structure-check

      - name: Validate skill SKILL.md compliance
        run: mise run validate-skills

      - name: Check AgentForge Layer 2 constraints
        run: python .agents/scripts/check_constraints.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install managed tools
        run: mise install

      - name: Install test dependencies
        run: mise run install-test-deps

      - name: Audit Python dependencies
        run: mise run audit

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 获取完整 git 历史（含 tags），供 PDM SCM 版本使用

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: 🔧 环境与依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          mise install
          mise run install-docs-deps

      - name: 📖 严格构建文档（-W --keep-going）
        run: mise run docs-strict

  test-container:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build test container
        run: docker build -f Containerfile.test -t taolib-test .

      - name: Run containerized tests
        run: docker run --rm taolib-test
