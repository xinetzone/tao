[env]
PYTHONUTF8 = "1"

[tools]
python = "3.14.5"
uv = "0.11.16"
node = { version = "22.22.3", postinstall = "corepack enable" }
"npm:defuddle" = { version = "0.18.1", depends = ["node"] }
ruff = "0.15.14"

[tasks.check-env]
description = "校验本地工具链版本"
run = "python .agents/scripts/check_env.py"

[tasks.sync]
description = "同步开发、测试、文档依赖与全部 extras（github-app/task）"
run = "uv sync --all-extras --group dev --group test --group docs"
depends = ["check-env"]

[tasks.install-test-deps]
description = "同步 CI 测试所需依赖（含 github-app 可选依赖）"
run = "bash .agents/scripts/sync-test-deps.sh"
depends = ["check-env"]

[tasks.install-docs-deps]
description = "同步文档构建所需依赖"
run = "uv sync --group dev --group docs"
depends = ["check-env"]

[tasks.test-github-app]
description = "运行 GitHub App 专项测试"
run = "uv run pytest tests/github_app -v"
depends = ["check-env"]

[tasks.test]
description = "运行完整测试集（含文档严格构建校验）"
run = "uv run pytest tests/ -v"
depends = ["check-env", "sync", "docs-strict"]

[tasks.test-coverage]
description = "运行带覆盖率的完整测试"
run = "uv run pytest tests/ -v --cov=taolib --cov-report=xml --cov-report=term-missing --cov-report=html:htmlcov --cov-fail-under=80"
depends = ["check-env"]

[tasks.test-release]
description = "运行发布前回归测试"
run = "uv run pytest tests/ -v --tb=short"
depends = ["check-env"]

[tasks.lint]
description = "运行 pre-commit 全量检查"
run = "uv run pre-commit run --all-files"
depends = ["check-env"]

[tasks.fmt]
description = "运行 Ruff 格式化"
run = "uv run ruff format ."
depends = ["check-env"]

[tasks.audit]
description = "审计 Python 依赖安全问题"
run = "uv run --with pip-audit pip-audit --desc --skip-editable"
depends = ["check-env"]

[tasks.docs-html]
description = "构建 HTML 文档"
run = "uv run invoke --search-root ../../docs build --target html --sourcedir ../../docs --builddir ../../docs/_build"
depends = ["check-env"]

[tasks.docs-linkcheck]
description = "执行文档外链校验"
run = "uv run invoke --search-root ../../docs linkcheck --sourcedir ../../docs --builddir ../../docs/_build"
depends = ["check-env"]

[tasks.docs-internal-linkcheck]
description = "校验 README/CHANGELOG/AGENTS 中的相对路径引用是否有效"
run = "python .agents/scripts/check_doc_links.py"

[tasks.docs-structure-check]
description = "校验 docs/ 目录结构遵循 tech/general 双轨分类规范"
run = "python .agents/scripts/check_docs_structure.py --docs-dir ../../docs"

[tasks.world-hierarchy-check]
description = "校验多世界层级结构遵循 world-hierarchy 规范"
run = "python .agents/scripts/check_world_hierarchy.py"

[tasks.docs-build]
description = "CI 文档构建入口"
run = "uv run invoke --search-root ../../docs build --target html --sourcedir ../../docs --builddir ../../docs/_build"
depends = ["check-env"]

[tasks.docs-strict]
description = "严格模式构建文档：警告即失败（CI 与 GitHub Pages 部署入口）"
env = { SPHINXOPTS = "-W --keep-going" }
run = "uv run invoke --search-root ../../docs build --target html --sourcedir ../../docs --builddir ../../docs/_build"
depends = ["check-env", "docs-structure-check"]

[tasks.init]
description = "一键环境初始化（跨平台，支持 Windows/Linux/macOS）"
run = "uv run invoke init"

[tasks.init-check]
description = "仅检查环境配置（跨平台，支持 Windows/Linux/macOS）"
run = "uv run invoke init-check"

[tasks.package-build]
description = "构建 Python 包"
run = "uv build"
depends = ["check-env"]

[tasks.container-build]
description = "构建本地开发容器"
run = "podman build -t taolib-dev -f Containerfile ."

[tasks.container-run]
description = "启动开发容器（挂载当前目录）"
run = "podman run -it --rm -v .:/workspace:Z taolib-dev"

[tasks.container-test]
description = "在容器中运行测试"
run = "podman build -f Containerfile.test -t taolib-test . && podman run --rm taolib-test"

[tasks.validate-skills]
description = "校验 .agents/skills/ 下所有技能的 SKILL.md 合规性"
run = "python .agents/scripts/validation/validate_skill_md.py"

[tasks.validate-json]
description = "通用 JSON Schema 验证工具"
run = "python .agents/scripts/validate_json_schema.py"
