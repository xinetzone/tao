[tools]
python = "3.14"
# PDM 包管理器（已全局安装，无需 mise 管理）
# 代码质量工具（pyproject.toml 中已配置 ruff 规则）
ruff = "latest"

[settings]
# 自动信任此项目配置
trusted_config_paths = ["."]

[tasks.setup]
description = "初始化开发环境"
run = "pdm install -G dev -G test -G auth -G task-queue -G analytics -G config-server -G data-sync -G email-service -G file-storage -G oauth -G rate-limiter -G multi-agent -G symphony"

[tasks.test]
description = "运行测试套件"
run = "pdm run pytest"

[tasks.lint]
description = "代码检查"
run = "ruff check src/ tests/"

[tasks.format]
description = "代码格式化"
run = "ruff format src/ tests/"
