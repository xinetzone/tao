  "uvicorn[standard]>=0.30.0",
  "sqlalchemy>=2.0",
  "jinja2>=3.1.0",
  "python-multipart>=0.0.9",
  "markdown>=3.5",
  "pygments>=2.17",
  "feedgen>=1.0.0",
  "itsdangerous>=2.1",
  "bcrypt>=4.0.0",
]

task-queue = ["redis[hiredis]>=5.0.0", "motor>=3.6.0", "pydantic>=2.0"]

task-queue-server = [
  "taolib[task-queue]",
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
]

email-service = [
  "motor>=3.6.0",
  "pydantic>=2.0",
  "pydantic-settings>=2.0",
  "redis[hiredis]>=5.0.0",
  "jinja2>=3.1.0",
  "httpx>=0.27.0",
  "aiosmtplib>=3.0.0",
]

email-service-server = [
  "taolib[email-service]",
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
]

analytics = ["motor>=3.6.0", "pydantic>=2.0", "pydantic-settings>=2.0"]

analytics-server = [
  "taolib[analytics]",
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
]

file-storage = [
  "motor>=3.6.0",
  "pydantic>=2.0",
  "pydantic-settings>=2.0",
  "aiobotocore>=2.12.0",
  "redis[hiredis]>=5.0.0",
]

file-storage-server = [
  "taolib[file-storage]",
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "python-multipart>=0.0.9",
]

file-storage-processing = ["Pillow>=10.0.0"]

file-storage-client = ["httpx>=0.27.0", "pydantic>=2.0"]

oauth = [
  "httpx>=0.27.0",
  "motor>=3.6.0",
  "pydantic>=2.0",
  "pydantic-settings>=2.0",
  "python-jose[cryptography]>=3.3.0",
  "cryptography>=42.0.0",
  "redis[hiredis]>=5.0.0",
]

oauth-server = [
  "taolib[oauth]",
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "passlib[bcrypt]>=1.7.4",
  "python-multipart>=0.0.9",
]

qrcode = ["qrcode[pil]>=7.4", "Pillow>=10.0"]

qrcode-server = [
  "taolib[qrcode]",
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "pydantic>=2.0",
  "pydantic-settings>=2.0",
]

audit = ["motor>=3.6.0", "pydantic>=2.0"]

audit-server = [
  "taolib[audit]",
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
]

[tool.pdm.version]
fallback_version = "0.0.0"
source = "scm"

[tool.pdm.build]
includes = ["src/taolib"]
package-dir = "src"

[tool.ruff]
exclude = [".git", ".venv", "doc/_build", ".pytest_cache", "__pycache__"]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
ignore = [
  "E501",   # line length handled by formatter
  "ANN401", # allow Any type in **kwargs
  "RUF001", # allow ambiguous unicode characters in strings (Chinese punctuation)
  "RUF002", # allow ambiguous unicode characters in docstrings (Chinese punctuation)
  "RUF003", # allow ambiguous unicode characters in comments (Chinese punctuation)
  "B008",   # allow function call in argument defaults (FastAPI Depends pattern)
  "ANN001", # missing type annotation for function argument
  "ANN003", # missing type annotation for **kwargs
  "ANN201", # missing return type annotation for public function
  "ANN202", # missing return type annotation for private function
  "ANN204", # missing return type annotation for special method
  "B904",   # raise without from inside except
  "SIM105", # suppressible-exception
  "RUF022", # unsorted __all__
  "SIM102", # collapsible-if
  "C401",   # unnecessary-generator-set
  "C416",   # unnecessary-comprehension
  "RUF006", # asyncio-dangling-task
  "UP046",  # non-pep695-generic-class
]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "ANN", # flake8-annotations
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "SIM", # flake8-simplify
  "RUF", # ruff-specific rules
]

[tool.ruff.lint.per-file-ignores]
"src/taolib/testing/analytics/server/api/*" = ["ANN"]
"src/taolib/testing/config_center/server/api/*" = ["ANN"]
"src/taolib/testing/email_service/server/api/*" = ["ANN"]
"src/taolib/testing/oauth/server/api/*" = ["ANN"]
"src/taolib/testing/qrcode/server/api/*" = ["ANN"]
"src/taolib/testing/task_queue/server/api/*" = ["ANN"]
"src/taolib/testing/data_sync/server/api/*" = ["ANN"]
"src/taolib/testing/file_storage/server/api/*" = ["ANN"]
"src/taolib/testing/rate_limiter/api/*" = ["ANN"]
"tests/*" = ["ANN", "S101"]

[tool.pytest.ini_options]
addopts = "-v --tb=short"
asyncio_mode = "auto"
python_classes = ["Test*"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
testpaths = ["tests"]

[tool.coverage.run]
branch = true
omit = ["*/rate_limiter/example_integration.py"]
source = ["src/taolib"]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
  "raise NotImplementedError",
]
fail_under = 80
show_missing = true
