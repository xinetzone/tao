  "passlib[bcrypt]>=1.7.4",
  "python-multipart>=0.0.9",
]

config-server = [
  "taolib[auth-server]",
  "uvicorn[standard]>=0.30.0",
  "motor>=3.6.0",
  "pydantic>=2.0",
  "pydantic-settings>=2.0",
  "jsonschema>=4.20.0",
]

config-client = ["httpx>=0.27.0", "websockets>=12.0", "pydantic>=2.0"]

data-sync = [
  "motor>=3.6.0",
  "pydantic>=2.0",
  "pydantic-settings>=2.0",
  "redis[hiredis]>=5.0.0",
  "jinja2>=3.1.0",
  "croniter>=2.0.0",
]

data-sync-server = [
  "taolib[data-sync]",
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
]

log-platform = [
  # 服务端
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "elasticsearch[async]>=8.12.0",
  "motor>=3.6.0",
  "redis[hiredis]>=5.0.0",
  "pydantic>=2.0",
  "pydantic-settings>=2.0",
  "watchfiles>=0.21.0",
  "httpx>=0.27.0",
  "aiofiles>=23.0",
