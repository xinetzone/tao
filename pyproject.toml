[build-system]
build-backend = "pdm.backend"
requires = ["pdm-backend"]

[project]
authors = [{ name = "xinetzone", email = "735613050@qq.com" }]
dependencies = []
description = "道可道，非恒道"
dynamic = ["version"]
license = { file = "LICENSE" }
maintainers = [{ name = "xinetzone", email = "735613050@qq.com" }]
name = "taolib"
readme = "README.md"
requires-python = ">=3.14"

[project.urls]
Documentation = "https://taolib.readthedocs.io/"
Repository = "https://github.com/xinetzone/tao"

[project.optional-dependencies]
doc = [
  "invoke",
  "mystx",
  "myst-nb",
  "sphinx-book-theme",
  "notebook>=7.0",
  "anywidget[dev]>=0.9.13",
  "ipywidgets>=8",
  "sphinx>=8.2.3",
  "ablog>=0.11.12",
  "nbsphinx",
  "folium",
  "sphinx-comments",
  "nbclient",
  "plotly",
  "sphinx-design",
  "sphinx-examples",
  "sphinx-copybutton",
  "sphinx-contributors",
  "sphinx-thebe",
  "sphinxcontrib-bibtex",
  "sphinxext-opengraph",
  "sphinx-sitemap",
  "sphinx-autoapi>=3.4",
  "graphviz",
  "sphinx-intl",            # 文档国际化
  "sphinx-tippy",
  "sphinxcontrib-mermaid",  # AI  # "libarchive-c",
  # "jupyterlite-core >=0.2,<0.8",
  # "jupyterlite-xeus-python",
  # "jupyterlite-sphinx",
  # "jupyterlite-xeus"
]

dev = ["invoke", "pandas", "numpy", "matplotlib>=3.10.0"]

